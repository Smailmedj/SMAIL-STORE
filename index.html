<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMAIL STORE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>SMAIL STORE</h1>
  <p>نقدّم لك أفضل متجر إلكتروني في المغرب</p>

  <div id="cart">🛒 السلة: <span id="cart-count">0</span></div>
  <div id="total">المجموع: <span id="total-price">0</span> DH</div>

  <div class="products">

    <div class="product">
      <img src="ps5.png" alt="PS5">
      <h2>PS5</h2>
      <p>7000 DH</p>
      <button class="add-btn">أضف للسلة</button>
    </div>

    <div class="product">
      <img src="a22.png" alt="Samsung A22">
      <h2>Samsung A22</h2>
      <p>2500 DH</p>
      <button class="add-btn">أضف للسلة</button>
    </div>

    <div class="product">
      <img src="iphone13.png" alt="iPhone 13">
      <h2>iPhone 13</h2>
      <p>9000 DH</p>
      <button class="add-btn">أضف للسلة</button>
    </div>

  </div>

  <button id="checkout">إتمام الشراء</button>

  <div id="payment-form" style="display:none;">
    <h2>تأكيد الطلب</h2>
    <input id="name" placeholder="الاسم"><br><br>
    <input id="phone" placeholder="رقم الهاتف"><br><br>
    <input id="address" placeholder="العنوان"><br><br>
    <button id="pay-now">تأكيد الطلب</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="script.js"></script>
</body>
</html>
